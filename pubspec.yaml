name: truenorth_app
description: TrueNorth - Shame-free wellness for every body
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.0
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1
  intl: ^0.20.2
  video_player: ^2.9.5
  fl_chart: ^0.70.2
  percent_indicator: ^4.2.4
  provider: ^6.1.5
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/videos/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#0B0B2A"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
