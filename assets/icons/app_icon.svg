<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1B0A2E"/>
      <stop offset="100%" stop-color="#0B0B2B"/>
    </radialGradient>
    <radialGradient id="starGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#FF3366"/>
      <stop offset="100%" stop-color="#FFB800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>

  <!-- Glow behind star -->
  <circle cx="256" cy="240" r="140" fill="url(#starGlow)"/>

  <!-- North Star / Compass shape -->
  <g filter="url(#glow)" transform="translate(256,240)">
    <!-- Main star points -->
    <polygon points="0,-130 35,-35 130,0 35,35 0,130 -35,35 -130,0 -35,-35" fill="url(#starGrad)" opacity="0.9"/>
    <!-- Inner diamond -->
    <polygon points="0,-70 50,-50 70,0 50,50 0,70 -50,50 -70,0 -50,-50" fill="#0B0B2B" opacity="0.7"/>
    <!-- Center bright dot -->
    <circle cx="0" cy="0" r="20" fill="#FFE66D" opacity="0.95"/>
    <circle cx="0" cy="0" r="10" fill="white" opacity="0.9"/>
  </g>

  <!-- Accent rays -->
  <g opacity="0.4" transform="translate(256,240)">
    <line x1="0" y1="-170" x2="0" y2="-140" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round"/>
    <line x1="120" y1="-120" x2="90" y2="-90" stroke="#FF3366" stroke-width="3" stroke-linecap="round"/>
    <line x1="170" y1="0" x2="140" y2="0" stroke="#00F5FF" stroke-width="3" stroke-linecap="round"/>
    <line x1="120" y1="120" x2="90" y2="90" stroke="#FFB800" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="170" x2="0" y2="140" stroke="#FF3366" stroke-width="3" stroke-linecap="round"/>
    <line x1="-120" y1="120" x2="-90" y2="90" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round"/>
    <line x1="-170" y1="0" x2="-140" y2="0" stroke="#FFE66D" stroke-width="3" stroke-linecap="round"/>
    <line x1="-120" y1="-120" x2="-90" y2="-90" stroke="#00F5FF" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>